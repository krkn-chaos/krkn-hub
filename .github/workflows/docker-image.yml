name: Docker Image CI
on:
  workflow_dispatch:
    inputs:
      test_list:
        description: Only run tests that match the regular expression
        default: ""
        required: false

  push:
    branches: ['main']
  pull_request:


jobs:
  list:
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.list-scenarios.outputs.scenarios }}
    steps:
      - name: Check out code
        uses: actions/checkout@main
      - name: List scenarios
        id: list-scenarios
        run: |
          echo "scenarios=$(docker compose config --services | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: list
    strategy:
      matrix:
        scenario: ${{ fromJson(needs.list.outputs.scenarios) }}
      fail-fast: false
    steps:
      - name: Check out code
        uses: actions/checkout@main
      - name: Free disk space
        run: |
          sudo docker image prune -af
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Add krknctl metadata to Dockerfiles
        run: |
          bash build.sh
      - name: Get image config
        id: config
        run: |
          IMAGE=$(docker compose config --format json | jq -r '.services["${{ matrix.scenario }}"].image')
          DOCKERFILE=$(docker compose config --format json | jq -r '.services["${{ matrix.scenario }}"].build.dockerfile')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
      - name: Login in quay
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          #platforms: linux/amd64,linux/arm64
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.config.outputs.image }}
          provenance: false

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Call repo lambda
        run: |
          curl --location --request POST '${{ secrets.LAMBDA_URL }}' --header 'Authorization: Bearer ${{ secrets.LAMBDA_TOKEN }}'
